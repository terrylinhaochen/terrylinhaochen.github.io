---
layout: default
---

<div class="projects-container">
  <div class="projects-grid">
    {% assign sorted_travel = site.travel | sort: "title" %}
    {% for post in sorted_travel %}
    <div class="project-card" onclick="openModal('{{ post.title | slugify }}')">
      <h3 class="project-title">{{ post.title }}</h3>
      <p class="project-description">{{ post.location }}</p>
      <p class="project-meta">{{ post.excerpt }}</p>
    </div>
    {% endfor %}
  </div>
</div>

<!-- Modal Template -->
<div class="modal-container">
  {% for post in site.travel %}
  <div id="modal-{{ post.title | slugify }}" class="modal-overlay">
    <div class="modal">
      <button class="modal-close" onclick="closeModal('{{ post.title | slugify }}')">&times;</button>
      <h2>{{ post.title }}</h2>
      <p class="project-meta">{{ post.location }}</p>
      <div class="modal-content">
        {{ post.content }}
      </div>
    </div>
  </div>
  {% endfor %}
</div>

<script>
function openModal(postId) {
  const modal = document.getElementById(`modal-${postId}`);
  if (modal) {
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
  }
}

function closeModal(postId) {
  const modal = document.getElementById(`modal-${postId}`);
  if (modal) {
    modal.classList.remove('active');
    document.body.style.overflow = 'auto';
  }
}

// Close modal when clicking outside
document.addEventListener('click', function(event) {
  if (event.target.classList.contains('modal-overlay')) {
    event.target.classList.remove('active');
    document.body.style.overflow = 'auto';
  }
});

// Close modal on escape key
document.addEventListener('keydown', function(event) {
  if (event.key === 'Escape') {
    const activeModal = document.querySelector('.modal-overlay.active');
    if (activeModal) {
      activeModal.classList.remove('active');
      document.body.style.overflow = 'auto';
    }
  }
});
</script>

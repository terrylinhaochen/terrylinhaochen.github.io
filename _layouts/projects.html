---
layout: default
---
<div class="projects">
  <h1>{{ page.title }}</h1>

  {% for project in site.projects %}
    <article class="post-preview">
      <h2><a href="{{ project.url | relative_url }}">{{ project.title }}</a></h2>
      <p>{{ project.excerpt | strip_html | truncatewords: 30 }}</p>
      <p class="post-meta">
        Date: {{ project.date | date: "%B %d, %Y" }}
      </p>
    </article>
  {% endfor %}
</div>

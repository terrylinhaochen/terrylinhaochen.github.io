# Book catalog for the /reading/ page.
#
# Two lists:
#   read:  books you've finished — each can carry personal notes (rendered in a
#          modal when the card is clicked)
#   shelf: books you own / plan to read — no notes needed
#
# Fields per book:
#   title:     (required)
#   author:    (required)
#   isbn:      (optional) used to auto-fetch the cover from Open Library
#   cover:     (optional) explicit cover image URL — overrides isbn lookup
#   date_read: (optional) free-form, e.g. "2025" or "March 2025"
#   rating:    (optional) 1-5
#   notes:     (optional, read list only) markdown supported
#
# cover_overrides fills missing cover metadata for generated Readwise entries.
cover_overrides:
  "牡丹亭": "https://books.google.com/books/content?id=16NdAwAAQBAJ&printsec=frontcover&img=1&zoom=1&edge=curl&source=gbs_api"
  "Miyazakiworld": "https://covers.openlibrary.org/b/id/10279492-L.jpg?default=false"
  "耻": "https://covers.openlibrary.org/b/id/11434870-L.jpg?default=false"
  "Against Empathy": "https://covers.openlibrary.org/b/id/12515747-L.jpg?default=false"

# Titles that the Readwise sync (scripts/sync_readwise_books.py) must never
# publish, even though they sit in the Readwise "books" category.
readwise_exclude:
  - "How to Use Readwise"
  - "The Story of My Life"
  - "Against Empathy"

